name: Daily Content Agent

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      day:
        description: "Optional day override"
        required: false
        type: string
      topic:
        description: "Optional topic override"
        required: false
        type: string
      skip_email:
        description: "Skip SMTP delivery"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LCA_OPENAI_MODEL: ${{ vars.LCA_OPENAI_MODEL }}
      LCA_OPENAI_SELECTION_REASONING: ${{ vars.LCA_OPENAI_SELECTION_REASONING }}
      LCA_OPENAI_GENERATION_REASONING: ${{ vars.LCA_OPENAI_GENERATION_REASONING }}
      LCA_OPENAI_AUDIT_REASONING: ${{ vars.LCA_OPENAI_AUDIT_REASONING }}
      LCA_TIMEZONE: ${{ vars.LCA_TIMEZONE }}
      LCA_SMTP_HOST: ${{ secrets.LCA_SMTP_HOST }}
      LCA_SMTP_PORT: ${{ secrets.LCA_SMTP_PORT }}
      LCA_SMTP_USERNAME: ${{ secrets.LCA_SMTP_USERNAME }}
      LCA_SMTP_PASSWORD: ${{ secrets.LCA_SMTP_PASSWORD }}
      LCA_SMTP_USE_SSL: ${{ vars.LCA_SMTP_USE_SSL }}
      LCA_EMAIL_FROM: ${{ secrets.LCA_EMAIL_FROM }}
      LCA_EMAIL_TO: ${{ secrets.LCA_EMAIL_TO }}
      LCA_RSS_FEEDS: ${{ vars.LCA_RSS_FEEDS }}
      LCA_REDDIT_SUBREDDITS: ${{ vars.LCA_REDDIT_SUBREDDITS }}
      LCA_YOUTUBE_CHANNEL_IDS: ${{ vars.LCA_YOUTUBE_CHANNEL_IDS }}
      LCA_REVIEW_BASE_URL: https://github.com/${{ github.repository }}/actions/workflows/review_capture.yml

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install --upgrade pip && pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Run content agent
        shell: bash
        run: |
          args=()
          if [ -n "${{ inputs.day }}" ]; then
            args+=(--day "${{ inputs.day }}")
          fi
          if [ -n "${{ inputs.topic }}" ]; then
            args+=(--topic "${{ inputs.topic }}")
          fi
          if [ "${{ inputs.skip_email }}" = "true" ]; then
            args+=(--skip-email)
          fi
          python -m linkedin_content_agent.cli run "${args[@]}"

      - name: Upload SQLite cache artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-agent-cache-${{ github.run_id }}
          path: data/artifacts/content_agent_cache.db
          if-no-files-found: warn

      - name: Commit archived outputs
        if: always()
        shell: bash
        run: |
          if git diff --quiet -- data; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "chore: archive content agent run"
          git push
