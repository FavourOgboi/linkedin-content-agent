name: Capture Review Decision

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID to review"
        required: true
        type: string
      decision:
        description: "Review decision"
        required: true
        type: choice
        options:
          - approved
          - rejected
      notes:
        description: "Review notes"
        required: false
        type: string

permissions:
  contents: write

jobs:
  capture-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install --upgrade pip && pip install -e .

      - name: Record review
        run: |
          python -m linkedin_content_agent.cli review \
            --run-id "${{ inputs.run_id }}" \
            --decision "${{ inputs.decision }}" \
            --notes "${{ inputs.notes }}"

      - name: Upload SQLite cache artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-agent-review-cache-${{ github.run_id }}
          path: data/artifacts/content_agent_cache.db
          if-no-files-found: warn

      - name: Commit review updates
        if: always()
        shell: bash
        run: |
          if git diff --quiet -- data; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "chore: capture review decision"
          git push
